name: mesher
description: "Offline P2P mesh messenger — Bluetooth Low Energy."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Local database
  drift: ^2.23.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.26

  # Secure key storage
  flutter_secure_storage: ^9.2.2

  # Cryptography (pure Dart — Ed25519, X25519, AES-256-GCM)
  cryptography: ^2.7.0

  # Foreground service (BLE scan в фоне)
  flutter_foreground_task: ^8.13.0

  # File paths
  path_provider: ^2.1.4
  path: ^1.9.1

  # Packet codec
  cbor: ^6.3.1

  # Utilities
  uuid: ^4.5.1

  # Local notifications (новые сообщения, входящие звонки)
  flutter_local_notifications: ^17.2.4

  # File picker (раздача файлов в swarm)
  file_picker: ^8.1.4

  # Hashing for swarm info_hash (SHA-256)
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.23.1

flutter:
  uses-material-design: true

  # fonts:  # Раскомментировать после добавления TTF в assets/fonts/
